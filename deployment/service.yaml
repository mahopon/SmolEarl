apiVersion: v1
kind: Service
metadata:
  name: smolearl-service
  labels:
    metrics: enabled
spec:
  type: NodePort
  selector:
    app: smolearl
  ports:
    - name: http
      port: 18090      # internal cluster port
      targetPort: 8000 # container port
      nodePort: 31000  # port accessible on the node
